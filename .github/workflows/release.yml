name: Release Cloud SDK documentation

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Generate GitHub App token
        id: app-token
        uses: actions/create-github-app-token@v3
        with:
          client-id: ${{ secrets.SAP_AI_SDK_BOT_CLIENT_ID }}
          private-key: ${{ secrets.SAP_AI_SDK_BOT_PRIVATE_KEY }}
          owner: SAP
          repositories: ai-sdk
          permission-contents: write
      - uses: actions/checkout@v6
        with:
          token: ${{ steps.app-token.outputs.token }}
      - uses: actions/setup-node@v6
        with:
          node-version: 20
      - name: Release Documentation to GitHub Pages
        env:
          GIT_USER: x-access-token
          GITHUB_TOKEN: ${{ steps.app-token.outputs.token }}
          BOT_EMAIL: ${{ secrets.SAP_AI_SDK_BOT_EMAIL }}
          BOT_NAME: ${{ secrets.SAP_AI_SDK_BOT_NAME }}
        run: |
          git config --global user.email "$BOT_EMAIL"
          git config --global user.name "$BOT_NAME"
          npm ci
          npx docusaurus deploy
